skill:
  name: vault_schema
  description: >
    Use this skill when you need to understand how data is structured in the local vault.
    It defines where different entities (mail, events, contacts, documents, drafts)
    are stored, what metadata they contain, and how they are linked together.
    This skill should be used before reading or writing any files in the vault.

