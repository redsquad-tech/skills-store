skill:
  name: "transcribe"
  description: >
    Используйте этот скилл для расшифровки аудио в текст с поддержкой диаризации и подсказок по известным спикерам. Подходит для извлечения речи из аудио/видео, создания транскриптов и разметки участников интервью или встреч.

  description_short: >
    Расшифровка аудио/видео в текст с разделением спикеров.

