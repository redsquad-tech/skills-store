skill:
  name: doc_ingest_md
  description: >
    Use this skill when you need to convert documents into Markdown for further processing.
    It takes files from the vault docs/source directory, converts them into Markdown format,
    and saves the results into docs/derived-md.
    This enables the agent to read, search, and analyze document content.

