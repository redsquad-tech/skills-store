skill:
  name: "slides"
  description: >
    Create and edit presentation slide decks (`.pptx`) with PptxGenJS, bundled layout helpers, and render/validation utilities. 
    Use when tasks involve building a new PowerPoint deck, recreating slides from screenshots/PDFs/reference decks, modifying slide content while preserving editable output, 
    adding charts/diagrams/visuals, or diagnosing layout issues such as overflow, overlaps, and font substitution.

review:
  status: "reviewed"
  summary: >
