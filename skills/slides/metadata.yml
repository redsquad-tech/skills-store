skill:
  name: "slides"
  description: >
    Используйте этот скилл для создания и редактирования презентаций `.pptx` с помощью PptxGenJS и утилит проверки макета. Подходит для сборки новых деков, восстановления слайдов по скриншотам/PDF, редактирования содержимого с сохранением редактируемости и диагностики проблем вёрстки (переполнение, пересечения, замены шрифтов).

  description_short: >
    Создание и редактирование презентаций `.pptx` с проверкой макета.

review:
  status: "basic-tested"
  summary: >
    Skill для работы с презентациями (PPT, PPTX, Google Slides): извлечение текста со слайдов, 
    анализ структуры и содержания, поиск информации и подготовка данных для дальнейшей обработки или конвертации.
  reviewed_by: "store-team"
  reviewed_at: "2026-03-30"

