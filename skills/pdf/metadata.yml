skill:
  name: "pdf"
  description: >
    Используйте этот скилл для чтения, создания и проверки PDF, когда важны отображение и структура документа. Для визуальной проверки рекомендуется рендерить страницы (Poppler), а для генерации и извлечения данных использовать `reportlab`, `pdfplumber` и `pypdf`.

  description_short: >
    Работа с PDF: чтение, извлечение данных и проверка отображения.

