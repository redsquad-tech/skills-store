skill:
  name: "pdf"
  description: >
    Используйте этот скилл для чтения, создания и редактирования документов `.docx`, особенно когда важно сохранить форматирование и вёрстку. Для визуальной проверки предпочтительно использовать `python-docx` и скрипт `scripts/render_docx.py`.

  description_short: >
    Работа с `.docx`: чтение, редактирование и проверка форматирования.

